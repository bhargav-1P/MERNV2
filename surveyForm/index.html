<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width,intial-scale=1.0">
        <title>Developer Survey Form</title>
        <link rel="stylesheet" href="styles.css"
    </head>
    <body>
        <h1 id="title">Developer Skills Survey</h1>
        <p id="description">Help us understand your learning journey</p>
        <form id=""survey-form>
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>
             <label for="email">Email</label>
             <input type=""text id=""mail" placeholder="Enter your email" required>
            <label for="Age">Age</label>
            <input type="number" id="age" min="10" max="100" placeholder="Your Age">

            <label for="role">Current Role</label>
            <select id="role">
                <option value="">select one</option>
                <option value="student">Student</option>
                <option value="employed">Employed</option>
                <option value="job-seeker">Job Seeker</option>
            </select>
            <p>Skills you want to learn(select all that apply)</p>
            <label><input type="checkbox" value="html">HTML</label>
            <label><input type="checkbox" value="css">CSS</label>
            <label><input type="checkbox"value="javascript">JavaScript</label>
            <label><input type="checkbox" value="react">React</label>
            <label for="Comment">Additional Comment</label>
            <textarea id="Comment" rows="4" placeholder="Tell me about your Goals"></textarea>
            <button type="submit">Submit</button>
        </form>
    </body>
</html>
