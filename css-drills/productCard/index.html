<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card - CSS Box Model</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="card-image">Product Image</div>
        <h3 class="card-title">Wireless Headphones</h3>
        <p class="card-description">High-quality sound with noise cancellation. Comfortable for all-day wear.</p>
        <span class="card-price">₹999</span>
        <button class="card-button">Add to Cart</button>
    </div>
</body>
</html>
